<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#141414">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cut Tracker">
<title>Cut &amp; Build — Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#141414; --panel:#1e1e1e; --panel2:#262626; --panel3:#2e2e2e;
    --line:#333; --line2:#404040;
    --text:#ededed; --muted:#9d9d95; --dim:#6c6c66;
    --orange:#FF6B1A; --orange-d:#3a2410; --orange-b:#5a3411;
    --green:#46c98a; --green-d:#16321f;
    --amber:#f2a623; --red:#e8593c; --blue:#5b9bd5;
    --sans:'IBM Plex Sans',sans-serif; --mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text); font-family:var(--sans);}
  body{font-size:15px; line-height:1.5;}
  #app{max-width:500px; margin:0 auto; min-height:100vh; background:var(--bg); padding-bottom:24px;}

  header{display:flex; align-items:center; justify-content:space-between; padding:16px 18px 12px; border-bottom:1px solid var(--line); position:relative;}
  header::after{content:""; position:absolute; left:0; bottom:-1px; width:64px; height:2px; background:var(--orange);}
  .brand{display:flex; flex-direction:column; gap:2px;}
  .brand .t1{font-family:var(--mono); font-weight:700; font-size:13px; letter-spacing:2px; color:var(--orange);}
  .brand .t2{font-weight:600; font-size:15px; letter-spacing:.3px;}
  .clock{font-family:var(--mono); font-size:12px; color:var(--muted); text-align:right; line-height:1.45;}
  .clock b{display:block; color:var(--text); font-size:13px; font-weight:600; letter-spacing:1px;}

  nav{display:flex; border-bottom:1px solid var(--line); background:var(--bg);}
  nav button{flex:1; background:none; border:none; color:var(--dim); padding:9px 2px 8px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; font-family:var(--sans); font-size:10px; letter-spacing:.3px; position:relative; transition:color .15s;}
  nav button svg{width:21px; height:21px; stroke:currentColor; fill:none; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round;}
  nav button.active{color:var(--orange);}
  nav button.active::before{content:""; position:absolute; top:0; left:18%; right:18%; height:2px; background:var(--orange); border-radius:0 0 3px 3px;}

  #view{padding:16px 16px 0;}
  .stack>*+*{margin-top:14px;}

  .card{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:15px;}
  .lbl{font-family:var(--mono); font-size:10.5px; letter-spacing:1.4px; text-transform:uppercase; color:var(--muted);}
  .h{font-size:16px; font-weight:600; letter-spacing:.2px;}
  .sub{color:var(--muted); font-size:13px;}
  .mono{font-family:var(--mono);}
  .big{font-family:var(--mono); font-weight:700; font-size:26px; letter-spacing:.5px; line-height:1;}
  .right{text-align:right;}

  .stepper{display:flex; align-items:center; justify-content:space-between; gap:8px; background:var(--panel2); border:1px solid var(--line); border-radius:12px; padding:8px 10px;}
  .stepper .nav-btn{background:var(--panel3); border:1px solid var(--line2); color:var(--text); width:34px; height:34px; border-radius:9px; font-size:17px; cursor:pointer; display:flex; align-items:center; justify-content:center;}
  .stepper .mid{text-align:center; flex:1;}
  .stepper .mid .d1{font-weight:600; font-size:14px;}
  .stepper .mid .d2{font-family:var(--mono); font-size:11px; color:var(--muted); letter-spacing:.5px;}
  .today-pill{font-family:var(--mono); font-size:10px; letter-spacing:1px; color:var(--orange); border:1px solid var(--orange-b); background:var(--orange-d); padding:3px 8px; border-radius:20px; cursor:pointer;}
  .today-pill.hidden{visibility:hidden;}

  .badges{display:flex; gap:8px; flex-wrap:wrap;}
  .badge{font-family:var(--mono); font-size:10.5px; letter-spacing:.8px; padding:4px 9px; border-radius:7px; border:1px solid var(--line2); color:var(--muted); background:var(--panel2);}
  .badge.hot{color:var(--orange); border-color:var(--orange-b); background:var(--orange-d);}

  /* calories + macros */
  .cal-ring-wrap{display:flex; align-items:center; gap:16px;}
  .ring{position:relative; flex:none;}
  .ring svg{transform:rotate(-90deg);}
  .ring .ctr{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .ring .ctr .n{font-family:var(--mono); font-weight:700; line-height:1;}
  .ring .ctr .u{font-family:var(--mono); font-size:9px; color:var(--muted); letter-spacing:1px; margin-top:3px;}
  .macrobars{display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-top:13px;}
  .mb{background:var(--panel2); border:1px solid var(--line); border-radius:9px; padding:9px 10px;}
  .mb .t{display:flex; justify-content:space-between; align-items:baseline;}
  .mb .t .k{font-family:var(--mono); font-size:10px; letter-spacing:.8px; text-transform:uppercase; color:var(--muted);}
  .mb .t .v{font-family:var(--mono); font-weight:600; font-size:14px;}
  .mb .bar{height:4px; background:var(--panel3); border-radius:3px; margin-top:7px; overflow:hidden;}
  .mb .bar>i{display:block; height:100%; width:0; border-radius:3px; transition:width .3s;}

  .meter{background:var(--panel); border:1px solid var(--line); border-radius:11px; padding:12px;}
  .meter .top{display:flex; align-items:baseline; justify-content:space-between; gap:6px;}
  .meter .val{font-family:var(--mono); font-weight:700; font-size:17px;}
  .meter .goal{font-family:var(--mono); font-size:11px; color:var(--dim);}
  .meter .bar{height:5px; background:var(--panel3); border-radius:3px; margin-top:8px; overflow:hidden;}
  .meter .bar>i{display:block; height:100%; width:0; border-radius:3px; transition:width .3s;}

  /* workout */
  .wk-head{display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:4px;}
  .wk-code{font-family:var(--mono); font-weight:700; font-size:19px; letter-spacing:1.5px;}
  .wk-type{font-size:13px; color:var(--muted);}
  .progbar{height:6px; background:var(--panel3); border-radius:4px; overflow:hidden; margin-top:10px;}
  .progbar>i{display:block; height:100%; background:var(--orange); width:0; transition:width .3s; border-radius:4px;}
  .progbar.done>i{background:var(--green);}
  ul.list{list-style:none; margin:12px 0 0; padding:0;}
  ul.list li{display:flex; align-items:center; gap:11px; padding:10px 0; border-top:1px solid var(--line);}
  ul.list li:first-child{border-top:none;}
  .check{flex:none; width:24px; height:24px; border-radius:7px; border:1.6px solid var(--line2); background:var(--panel2); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:.12s;}
  .check svg{width:14px; height:14px; stroke:#fff; fill:none; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; opacity:0;}
  .check.on{background:var(--green); border-color:var(--green);}
  .check.on svg{opacity:1;}
  .ex-main{flex:1; min-width:0;}
  .ex-name{font-size:14.5px; transition:.12s;}
  .ex-name.done{color:var(--dim); text-decoration:line-through;}
  .ex-scheme{font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:1px; line-height:1.45;}
  .ex-log{margin-top:7px; width:100%; background:var(--panel2); border:1px solid var(--line); color:var(--text); font-family:var(--mono); font-size:12px; padding:6px 8px; border-radius:7px;}
  .ex-log::placeholder{color:var(--dim);}

  .row{display:flex; gap:10px;}
  .row>*{flex:1;}
  .field{display:flex; align-items:center; gap:10px;}
  .field label{font-size:13.5px; color:var(--muted); min-width:54px;}
  input.num, select.sel{flex:1; background:var(--panel2); border:1px solid var(--line2); color:var(--text); font-family:var(--mono); font-size:16px; padding:9px 11px; border-radius:9px; -moz-appearance:textfield; min-width:0;}
  input.num::-webkit-outer-spin-button, input.num::-webkit-inner-spin-button{-webkit-appearance:none; margin:0;}
  input.num:focus, .ex-log:focus, select.sel:focus, input.search:focus{outline:none; border-color:var(--orange);}
  .unit{font-family:var(--mono); font-size:12px; color:var(--dim);}
  select.sel{font-size:14px; cursor:pointer;}

  /* water */
  .wbtns{display:flex; gap:8px; flex-wrap:wrap; margin-top:13px;}
  .wbtn{flex:1; min-width:64px; background:var(--panel2); border:1px solid var(--line2); color:var(--text); font-family:var(--mono); font-size:13px; padding:11px 4px; border-radius:10px; cursor:pointer; transition:.12s;}
  .wbtn:active{background:var(--orange-d); border-color:var(--orange-b);}
  .wbtn.ghost{flex:none; color:var(--muted);}
  .hbars{display:flex; align-items:flex-end; gap:4px; height:70px; margin-top:6px;}
  .hbars .b{flex:1; display:flex; flex-direction:column; justify-content:flex-end; gap:4px; align-items:center;}
  .hbars .b .fill{width:100%; background:var(--orange); border-radius:3px 3px 0 0; min-height:2px;}
  .hbars .b.hit .fill{background:var(--green);}
  .hbars .b .dy{font-family:var(--mono); font-size:8.5px; color:var(--dim);}

  /* calendar */
  .legend{display:flex; gap:14px; flex-wrap:wrap; margin-top:10px;}
  .legend span{display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--muted);}
  .dot{width:11px; height:11px; border-radius:4px; flex:none;}
  .cal-week{margin-top:12px;}
  .cal-week .wlab{display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;}
  .cal-week .wlab .wn{font-family:var(--mono); font-size:11px; letter-spacing:.8px; color:var(--text);}
  .cal-week .wlab .wp{font-family:var(--mono); font-size:9.5px; color:var(--dim); letter-spacing:.5px;}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:5px;}
  .cell{aspect-ratio:1; border-radius:8px; border:1px solid var(--line); background:var(--panel); display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; position:relative; gap:1px;}
  .cell .dn{font-family:var(--mono); font-size:12px; font-weight:600;}
  .cell .dc{font-family:var(--mono); font-size:7.5px; color:var(--dim); letter-spacing:.3px;}
  .cell.future{opacity:.4;}
  .cell.done{background:var(--orange-d); border-color:var(--orange-b);}
  .cell.done .dn{color:var(--orange);}
  .cell.missed{border-color:var(--line2);}
  .cell.missed .dn{color:var(--muted);}
  .cell.today{box-shadow:0 0 0 2px var(--orange);}
  .cell .mk{position:absolute; top:4px; right:5px; width:6px; height:6px; border-radius:50%;}
  .cell.done .mk{background:var(--green);}
  .weekday-head{display:grid; grid-template-columns:repeat(7,1fr); gap:5px; margin-top:6px;}
  .weekday-head span{text-align:center; font-family:var(--mono); font-size:9px; color:var(--dim); letter-spacing:.5px;}

  /* food */
  input.search{width:100%; background:var(--panel2); border:1px solid var(--line2); color:var(--text); font-family:var(--sans); font-size:15px; padding:12px 13px; border-radius:10px;}
  input.search::placeholder{color:var(--dim);}
  #foodresults{margin-top:10px;}
  .fr{display:flex; align-items:center; gap:10px; padding:10px 11px; border:1px solid var(--line); border-radius:10px; margin-bottom:7px; cursor:pointer; background:var(--panel2); transition:.12s;}
  .fr:active{border-color:var(--orange-b); background:var(--orange-d);}
  .fr .fr-l{flex:1; min-width:0;}
  .fr .fr-n{font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .fr .fr-m{font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:2px;}
  .fr .fr-add{flex:none; width:28px; height:28px; border-radius:8px; background:var(--orange-d); border:1px solid var(--orange-b); color:var(--orange); font-size:18px; display:flex; align-items:center; justify-content:center;}
  .fr.local .fr-n::after{content:" · common"; color:var(--dim); font-size:11px; font-weight:400;}
  .srcnote{font-family:var(--mono); font-size:11px; color:var(--dim); margin:4px 0 8px;}
  .floli{display:flex; align-items:center; gap:10px; padding:10px 0; border-top:1px solid var(--line);}
  .floli:first-child{border-top:none;}
  .qtyin{flex:none; width:54px; background:var(--panel2); border:1px solid var(--line2); color:var(--text); font-family:var(--mono); font-size:14px; padding:6px 6px; border-radius:8px; text-align:center; -moz-appearance:textfield;}
  .qtyin::-webkit-outer-spin-button,.qtyin::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .delx{flex:none; width:30px; height:30px; border-radius:8px; background:none; border:1px solid var(--line2); color:var(--dim); font-size:14px; cursor:pointer;}
  .totrow{display:flex; justify-content:space-between; align-items:baseline; margin-top:12px; padding-top:12px; border-top:2px solid var(--line2);}
  .totrow .tk{font-family:var(--mono); font-weight:700; font-size:18px;}

  details.dd{background:var(--panel); border:1px solid var(--line); border-radius:11px; overflow:hidden;}
  details.dd+details.dd{margin-top:10px;}
  details.dd>summary{list-style:none; cursor:pointer; padding:13px 14px; display:flex; align-items:center; justify-content:space-between; gap:10px;}
  details.dd>summary::-webkit-details-marker{display:none;}
  .rc-name{font-size:14.5px; font-weight:600;} .rc-meta{font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:2px;}
  .rc-p{font-family:var(--mono); font-weight:700; font-size:14px; color:var(--orange); flex:none;}
  .rc-body{padding:0 14px 14px; border-top:1px solid var(--line);}
  .rc-body h5{margin:12px 0 6px; font-family:var(--mono); font-size:10px; letter-spacing:1px; color:var(--muted); text-transform:uppercase;}
  .rc-body ul{margin:0; padding-left:18px;} .rc-body ul li{margin:3px 0; font-size:13.5px;}
  .rc-body p{margin:0; font-size:13.5px; color:#dcdcd6;}
  table.cheat{width:100%; border-collapse:collapse; font-size:13px; margin-top:8px;}
  table.cheat td{padding:7px 4px; border-top:1px solid var(--line);}
  table.cheat td:last-child{text-align:right; font-family:var(--mono); color:var(--orange); white-space:nowrap;}
  table.cheat tr:first-child td{border-top:none;}

  /* profile */
  .seg{display:flex; background:var(--panel2); border:1px solid var(--line2); border-radius:9px; overflow:hidden;}
  .seg button{flex:1; background:none; border:none; color:var(--muted); font-family:var(--sans); font-size:14px; padding:9px; cursor:pointer;}
  .seg button.on{background:var(--orange-d); color:var(--orange);}
  .prow{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:11px 0; border-top:1px solid var(--line);}
  .prow:first-child{border-top:none;}
  .prow>label{font-size:14px; color:var(--text); flex:none;}
  .prow>.pin{flex:1; max-width:200px;}
  .compute{background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:13px; margin-top:13px;}
  .compute .cl{display:flex; justify-content:space-between; padding:5px 0; font-size:13.5px;}
  .compute .cl b{font-family:var(--mono);}

  .stats{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .stat{background:var(--panel); border:1px solid var(--line); border-radius:11px; padding:13px;}
  .stat .n{font-family:var(--mono); font-weight:700; font-size:23px; line-height:1;}
  .stat .l{font-size:12px; color:var(--muted); margin-top:5px;}
  .gauge{height:9px; background:var(--panel3); border-radius:5px; overflow:hidden; margin:10px 0 6px;}
  .gauge>i{display:block; height:100%; background:linear-gradient(90deg,var(--orange),var(--amber)); border-radius:5px; transition:width .3s;}
  .danger{background:none; border:1px solid var(--red); color:var(--red); font-family:var(--mono); font-size:12px; padding:9px 12px; border-radius:9px; cursor:pointer; width:100%;}
  .note{font-size:12.5px; color:var(--muted); background:var(--panel2); border-left:2px solid var(--orange); border-radius:0 8px 8px 0; padding:10px 12px;}
  .banner{background:var(--orange-d); border:1px solid var(--orange-b); color:#ffcfae; border-radius:9px; padding:9px 12px; font-size:12.5px; margin:0 16px 4px;}
  .footer{text-align:center; color:var(--dim); font-size:11px; padding:18px 16px 4px; font-family:var(--mono); letter-spacing:.5px;}
  .addbtn{width:100%; background:var(--orange-d); border:1px solid var(--orange-b); color:var(--orange); font-family:var(--mono); font-size:13px; letter-spacing:.5px; padding:11px; border-radius:10px; cursor:pointer; margin-top:4px;}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand"><span class="t1">OVERRIDE</span><span class="t2">Cut &amp; Build Tracker</span></div>
    <div class="clock" id="clock"></div>
  </header>
  <nav id="nav">
    <button data-action="tab" data-tab="today" class="active"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L20 5"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h11"/></svg>Today</button>
    <button data-action="tab" data-tab="food"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>Food</button>
    <button data-action="tab" data-tab="calendar"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Plan</button>
    <button data-action="tab" data-tab="progress"><svg viewBox="0 0 24 24"><path d="M4 19V5M4 19h16"/><path d="M7 16l4-5 3 3 5-7"/></svg>Progress</button>
    <button data-action="tab" data-tab="profile"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>Profile</button>
  </nav>
  <div id="storeWarn"></div>
  <div id="view" class="stack"></div>
  <div class="footer">real engineer · AI-assisted · production-grade</div>
</div>

<script>
"use strict";

/* ---------- program config (fixed) ---------- */
var START = new Date(2026,5,1);   // Mon Jun 1 2026
var WEEKS = 9;
var STEP_TARGET = 9000;
function waterTargetMl(dow){ return dow===0 ? 2800 : 3800; }

var SCHEDULE = {
  1:{day:"Monday",code:"LOWER A",type:"Lower body + core",kind:"lift",
     items:[["la1","Goblet squat (one 40)","4 × 12–15"],["la2","DB Romanian deadlift (40s)","4 × 12–15"],["la3","Reverse lunge (40s/25s)","3 × 10–12 /leg"],["la4","DB hip thrust (40)","3 × 15–20"],["la5","Standing calf raise","3 × 20"],["la6","Plank","3 × 45–60s"],["la7","Dead bug","3 × 10 /side"]]},
  2:{day:"Tuesday",code:"UPPER A",type:"Upper body",kind:"lift",
     items:[["ua1","DB floor press (40s)","4 × 10–12"],["ua2","One-arm DB row (40)","4 × 10–12 /arm"],["ua3","DB shoulder press","3 × 10–12"],["ua4","Band pull-apart / face pull","3 × 15"],["ua5","DB curl (25s)","3 × 12"],["ua6","Overhead triceps ext (25)","3 × 12"]]},
  3:{day:"Wednesday",code:"CONDITIONING",type:"Circuit + walk",kind:"cond",
     items:[["c1","DB swing (40 / 25s)","40s × 4–5 rounds"],["c2","Goblet squat (25)","40s"],["c3","Renegade row (25s)","40s"],["c4","Step-up, fast","40s"],["c5","Band high-pull","40s"],["c6","Brisk walk after","20–30 min"]]},
  4:{day:"Thursday",code:"LOWER B",type:"Lower body + core",kind:"lift",
     items:[["lb1","Bulgarian split squat (25s)","4 × 10–12 /leg"],["lb2","DB sumo deadlift (40s=80)","4 × 12"],["lb3","Step-up (40s)","3 × 12 /leg"],["lb4","Band leg curl / SL-RDL","3 × 12 /leg"],["lb5","Walking lunge","3 × 20 steps"],["lb6","Lying leg raise","3 × 12"]]},
  5:{day:"Friday",code:"UPPER B",type:"Upper body",kind:"lift",
     items:[["ub1","DB incline press (feet up)","4 × 10–12"],["ub2","Bent-over DB row (40s)","4 × 12"],["ub3","Lateral raise (25s)","3 × 15"],["ub4","DB pullover (40)","3 × 12"],["ub5","Hammer curl (25s)","3 × 12"],["ub6","Bench dip / band pushdown","3 × 15"]]},
  6:{day:"Saturday",code:"LONG WALK",type:"Active recovery",kind:"walk",
     items:[["s1","Long walk","45–60 min"],["s2","Optional full-body circuit","if up for it"]]},
  0:{day:"Sunday",code:"REST",type:"Recovery",kind:"rest",
     items:[["r1","Mobility / stretch","10–15 min"],["r2","Easy walk","20–30 min"]]}
};
var MEALS = [["m1","~6:30a","Meal 1 — eggs-based"],["m2","~9:30–10a","Meal 2 — pre-workout"],["m3","~1:00p","Meal 3 — post-workout, biggest"]];

/* ---------- state + storage ---------- */
var state = { profile:null, days:{}, sel:null, tab:"today" };
var storeMode = "memory";
var saveT = null;

function defaultProfile(){ return { sex:"male", age:54, heightIn:67, startWt:197, goalWt:175, activity:1.55, rate:2, calTarget:null, proteinTarget:190 }; }
function dkey(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function pad(n){ return (n<10?"0":"")+n; }
function fromKey(k){ var p=k.split("-"); return new Date(+p[0],+p[1]-1,+p[2]); }
function addDays(d,n){ var x=new Date(d); x.setDate(x.getDate()+n); return x; }
function dayDiff(a,b){ return Math.round((fromKey(dkey(a)).getTime()-fromKey(dkey(b)).getTime())/86400000); }
function today(){ return new Date(); }
function uid(){ return "f"+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function getDay(k){
  if(!state.days[k]) state.days[k] = { water:0, steps:null, ex:{}, meals:{}, log:{}, notes:"", wt:{am:null,pm:null}, food:[] };
  var d=state.days[k];
  if(!d.wt) d.wt={am:(typeof d.weight==="number"?d.weight:null),pm:null};
  if(!d.food) d.food=[];
  return d;
}
function applyData(d){ state.profile=Object.assign(defaultProfile(), d.profile||{}); state.days=d.days||{}; }
function migrate(){ for(var k in state.days){ var d=state.days[k]; if(d&&!d.wt) d.wt={am:(typeof d.weight==="number"?d.weight:null),pm:null}; if(d&&!d.food) d.food=[]; } }
function saveAll(){
  clearTimeout(saveT);
  saveT=setTimeout(function(){
    var val=JSON.stringify({v:2, profile:state.profile, days:state.days});
    try{
      if(storeMode==="claude"&&window.storage) window.storage.set("cutdata", val);
      else if(storeMode==="local") window.localStorage.setItem("cutTracker.data", val);
    }catch(e){ console.warn("save failed",e); }
  },350);
}
async function loadAll(){
  if(window.storage && typeof window.storage.get==="function"){
    storeMode="claude";
    try{ var r=await window.storage.get("cutdata"); if(r&&r.value){ applyData(JSON.parse(r.value)); migrate(); return; } }catch(e){}
    try{ var rd=await window.storage.get("days"); if(rd&&rd.value){ state.days=JSON.parse(rd.value); state.profile=defaultProfile(); migrate(); saveAll(); return; } }catch(e){}
    state.profile=defaultProfile(); return;
  }
  try{
    window.localStorage.setItem("__p__","1"); window.localStorage.removeItem("__p__");
    storeMode="local";
    var s=window.localStorage.getItem("cutTracker.data");
    if(s){ applyData(JSON.parse(s)); migrate(); return; }
    var sd=window.localStorage.getItem("cutTracker.days");
    if(sd){ state.days=JSON.parse(sd); state.profile=defaultProfile(); migrate(); saveAll(); return; }
    state.profile=defaultProfile(); return;
  }catch(e){ storeMode="memory"; state.profile=defaultProfile(); }
  if(storeMode==="memory"){
    document.getElementById("storeWarn").innerHTML='<div class="banner">Saving isn\'t available here — progress is session-only. Use this in the Claude app or host it over https to keep your logs. Export a backup from Progress anytime.</div>';
  }
}

/* ---------- targets ---------- */
function calcTargets(){
  var p=state.profile;
  var cw = (latestWeight()!=null)? latestWeight() : p.startWt;
  var kg=cw*0.453592, cm=p.heightIn*2.54;
  var b = 10*kg + 6.25*cm - 5*p.age + (p.sex==="male"?5:-161);
  var tdee = b*p.activity;
  var recCal = Math.round((tdee - p.rate*500)/10)*10;
  if(recCal<1200) recCal=1200;
  var calTarget = (p.calTarget!=null)? p.calTarget : recCal;
  var recProt = Math.round(p.goalWt);
  var protTarget = (p.proteinTarget!=null)? p.proteinTarget : recProt;
  return { bmr:Math.round(b), tdee:Math.round(tdee), recCal:recCal, calTarget:calTarget, recProt:recProt, protTarget:protTarget, current:cw };
}

/* ---------- weight helpers ---------- */
function dailyWeight(d){ if(!d) return null; if(d.wt){ if(d.wt.am!=null) return d.wt.am; if(d.wt.pm!=null) return d.wt.pm; } if(typeof d.weight==="number") return d.weight; return null; }
function latestWeight(){ for(var i=0;i<160;i++){ var v=dailyWeight(state.days[dkey(addDays(today(),-i))]); if(v!=null) return v; } return null; }
function sevenDayAvg(d){ var s=0,n=0; for(var i=0;i<7;i++){ var v=dailyWeight(state.days[dkey(addDays(d,-i))]); if(v!=null){ s+=v; n++; } } return n? s/n : null; }
function weeklySummary(){
  var rows=[], prev=state.profile.startWt;
  for(var w=0; w<WEEKS; w++){
    var wkStart=addDays(START,w*7), vals=[];
    for(var d=0; d<7; d++){ var v=dailyWeight(state.days[dkey(addDays(wkStart,d))]); if(v!=null) vals.push(v); }
    var rep = vals.length? vals.reduce(function(a,b){return a+b;},0)/vals.length : null;
    var lost = rep!=null? (prev-rep) : null;
    rows.push({w:w+1,start:wkStart,end:addDays(wkStart,6),rep:rep,lost:lost});
    if(rep!=null) prev=rep;
  }
  var hasData=rows.some(function(r){return r.rep!=null;});
  return { rows:rows, latest:prev, hasData:hasData, total:(state.profile.startWt-prev) };
}

/* ---------- food helpers ---------- */
function dayMacros(day){
  var t={kcal:0,p:0,c:0,sugar:0,f:0};
  (day.food||[]).forEach(function(e){ var q=e.qty||1; t.kcal+=e.kcal*q; t.p+=e.p*q; t.c+=e.c*q; t.sugar+=e.sugar*q; t.f+=e.f*q; });
  t.kcal=Math.round(t.kcal); t.p=Math.round(t.p); t.c=Math.round(t.c); t.sugar=Math.round(t.sugar); t.f=Math.round(t.f);
  return t;
}
function num(x){ var v=parseFloat(x); return isNaN(v)?null:v; }
function r1(x){ return x==null?0:Math.round(x*10)/10; }
function parseOFF(prod){
  var n=prod.nutriments||{}; var name=(prod.product_name||"").trim(); if(!name) return null;
  var brand=(prod.brands||"").split(",")[0].trim();
  var basis="serving";
  var kcal=num(n["energy-kcal_serving"]), p=num(n["proteins_serving"]), c=num(n["carbohydrates_serving"]), su=num(n["sugars_serving"]), f=num(n["fat_serving"]);
  if(kcal==null){ basis="100 g"; kcal=num(n["energy-kcal_100g"]); p=num(n["proteins_100g"]); c=num(n["carbohydrates_100g"]); su=num(n["sugars_100g"]); f=num(n["fat_100g"]); }
  if(kcal==null) return null;
  var serving = basis==="serving" ? (prod.serving_size||"1 serving") : "per 100 g";
  return { name:name, brand:brand, serving:serving, kcal:Math.round(kcal), p:r1(p), c:r1(c), sugar:r1(su), f:r1(f) };
}

/* ---------- rendering ---------- */
function pct(v,t){ return t>0? Math.max(0,Math.min(100,Math.round((v/t)*100))) : 0; }
function esc(s){ return (s+"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function shortTag(sc){ var c=sc.code; if(c==="LOWER A")return"LO A"; if(c==="UPPER A")return"UP A"; if(c==="LOWER B")return"LO B"; if(c==="UPPER B")return"UP B"; if(c==="CONDITIONING")return"COND"; if(c==="LONG WALK")return"WALK"; return"REST"; }
function programWeek(d){ var diff=dayDiff(d,START); if(diff<0) return 0; var w=Math.floor(diff/7)+1; return w>WEEKS?WEEKS+1:w; }
function phaseText(w){ if(w<1||w>WEEKS) return ""; if(w<=3) return "Phase 1 · hit the top of every rep range"; if(w<=6) return "Phase 2 · 3-sec lowering, rest 45–60s"; return "Phase 3 · band over the DB, +1 set, hardest variations"; }
function weekBadge(w){ if(w===0) return "PRE-START"; if(w>WEEKS) return "BLOCK DONE"; return "WEEK "+w+" / "+WEEKS; }

function render(){
  var nav=document.getElementById("nav").children;
  for(var i=0;i<nav.length;i++) nav[i].classList.toggle("active", nav[i].getAttribute("data-tab")===state.tab);
  var v=document.getElementById("view");
  if(state.tab==="today") v.innerHTML=viewToday();
  else if(state.tab==="food"){ v.innerHTML=viewFood(); renderFoodResults(false); }
  else if(state.tab==="calendar") v.innerHTML=viewCalendar();
  else if(state.tab==="progress"){ v.innerHTML=viewProgress(); drawChart(); }
  else if(state.tab==="profile") v.innerHTML=viewProfile();
  window.scrollTo(0,0);
}

function doFoodSearch(q){
  q=(q||"").trim();
  if(q.length<2){ searchResults=[]; searchState="idle"; renderFoodResults(false); return; }
  var ql=q.toLowerCase();
  var local=LOCAL_FOODS.filter(function(fd){ return fd.name.toLowerCase().indexOf(ql)>=0; }).map(function(fd){ return {name:fd.name,brand:"",serving:fd.serving,kcal:fd.kcal,p:fd.p,c:fd.c,sugar:fd.sugar,f:fd.f,local:true}; });
  searchResults=local.slice(); searchState="loading"; renderFoodResults(false);
  if(searchAbort){ try{ searchAbort.abort(); }catch(e){} }
  searchAbort=new AbortController();
  var to=setTimeout(function(){ try{ searchAbort.abort(); }catch(e){} },7000);
  var url="https://world.openfoodfacts.org/cgi/search.pl?search_terms="+encodeURIComponent(q)+"&search_simple=1&action=process&json=1&page_size=20&fields=product_name,brands,nutriments,serving_size,serving_quantity";
  fetch(url,{signal:searchAbort.signal}).then(function(r){return r.json();}).then(function(d){
    clearTimeout(to);
    var prods=(d&&d.products)||[], parsed=[];
    for(var i=0;i<prods.length;i++){ var pp=parseOFF(prods[i]); if(pp) parsed.push(pp); }
    searchResults=local.concat(parsed); searchState=parsed.length?"ok":"empty"; renderFoodResults(false);
  }).catch(function(e){ clearTimeout(to); if(e&&e.name==="AbortError") return; searchState="error"; renderFoodResults(false); });
}

function drawChart(){

  var SW=state.profile.startWt, GW=state.profile.goalWt;
  var padL=46,padR=14,padT=16,padB=24,x0=padL,x1=W-padR,y0=padT,y1=H-padB,minD=-3,maxD=WEEKS*7,lo=GW-2,hi=SW+2;
  function X(d){return x0+(d-minD)/(maxD-minD)*(x1-x0);} function Y(w){return y1-(w-lo)/(hi-lo)*(y1-y0);}

  ctx.strokeStyle="#FF6B1A"; ctx.lineWidth=2.5; ctx.beginPath(); pts.forEach(function(p,i){ var a=X(p.x),b=Y(p.w); i?ctx.lineTo(a,b):ctx.moveTo(a,b); }); ctx.stroke();
  ctx.fillStyle="#FF6B1A"; pts.forEach(function(p){ ctx.beginPath(); ctx.arc(X(p.x),Y(p.w),3.2,0,7); ctx.fill(); });
  var ap=[]; pts.forEach(function(p){ var s=0,n=0; for(var k=0;k<pts.length;k++){ if(pts[k].x<=p.x&&pts[k].x>p.x-7){s+=pts[k].w;n++;} } if(n)ap.push({x:p.x,w:s/n}); });

  if(a==="water-add"){ day=getDay(k); day.water+=+t.getAttribute("data-ml"); saveAll(); render(); return; }
  if(a==="water-reset"){ day=getDay(k); day.water=0; saveAll(); render(); return; }
  if(a==="add-food"){ var f=searchResults[+t.getAttribute("data-idx")]; if(f){ day=getDay(k); day.food.push({id:uid(),name:f.name,brand:f.brand||"",serving:f.serving,kcal:f.kcal,p:f.p,c:f.c,sugar:f.sugar,f:f.f,qty:1}); saveAll(); refreshFoodLog(); } return; }
  if(a==="food-del"){ day=getDay(k); var fid=t.getAttribute("data-id"); day.food=day.food.filter(function(x){return x.id!==fid;}); saveAll(); refreshFoodLog(); return; }
  if(a==="add-custom"){
    var nm=(document.getElementById("cf-name")||{}).value||""; nm=nm.trim(); if(!nm){ alert("Give the item a name."); return; }
    day=getDay(k);
    day.food.push({id:uid(),name:nm,brand:"custom",serving:"1 serving",kcal:Math.round(parseFloat((document.getElementById("cf-kcal")||{}).value)||0),p:r1(parseFloat((document.getElementById("cf-p")||{}).value)||0),c:r1(parseFloat((document.getElementById("cf-c")||{}).value)||0),sugar:r1(parseFloat((document.getElementById("cf-sugar")||{}).value)||0),f:r1(parseFloat((document.getElementById("cf-f")||{}).value)||0),qty:1});
    saveAll(); render(); return;
  }
  if(a==="prof-sex"){ state.profile.sex=t.getAttribute("data-val"); saveAll(); render(); return; }
  if(a==="export"){ try{ var blob=new Blob([JSON.stringify({profile:state.profile,days:state.days},null,2)],{type:"application/json"}); var url=URL.createObjectURL(blob); var el=document.createElement("a"); el.href=url; el.download="cut-tracker-backup-"+dkey(today())+".json"; document.body.appendChild(el); el.click(); el.remove(); setTimeout(function(){URL.revokeObjectURL(url);},1000); }catch(err){ alert("Couldn't export here — try over https."); } return; }
  if(a==="import-click"){ var imp=document.getElementById("importer"); if(imp) imp.click(); return; }
  if(a==="reset-all"){ if(confirm("Erase ALL logged data (workouts, food, water, weight)? Can't be undone.")){ state.days={}; try{ if(storeMode==="claude"&&window.storage) window.storage.delete("cutdata"); else if(storeMode==="local") window.localStorage.removeItem("cutTracker.data"); }catch(err){} render(); } return; }
});

document.addEventListener("change", function(e){
  var t=e.target; if(t&&t.id==="importer"){ var f=t.files&&t.files[0]; if(!f) return; var rd=new FileReader(); rd.onload=function(){ try{ var o=JSON.parse(rd.result); if(o&&typeof o==="object"){ applyData(o); migrate(); saveAll(); render(); alert("Backup imported."); } else alert("That file didn't look like a backup."); }catch(err){ alert("Couldn't read that file."); } }; rd.readAsText(f); t.value=""; return; }
  if(!t.dataset||!t.dataset.field) return; var f2=t.dataset.field, day=getDay(dkey(state.sel)), p=state.profile;
  if(f2==="wt-am"||f2==="wt-pm"){ if(!day.wt) day.wt={am:null,pm:null}; var v=parseFloat(t.value); v=isNaN(v)?null:v; if(f2==="wt-am") day.wt.am=v; else day.wt.pm=v; saveAll(); render(); }
  else if(f2==="steps"){ var s=parseInt(t.value,10); day.steps=isNaN(s)?null:s; saveAll(); render(); }
  else if(f2==="food-qty"){ var fid=t.dataset.id, q=parseFloat(t.value); q=(isNaN(q)||q<0)?1:q; var en=day.food.filter(function(x){return x.id===fid;})[0]; if(en){ en.qty=q; saveAll(); refreshFoodLog(); } }
  else if(f2==="prof-age"){ p.age=Math.max(13,parseInt(t.value,10)||p.age); saveAll(); render(); }
  else if(f2==="prof-ft"||f2==="prof-in"){ var ftv=parseInt((document.querySelector('[data-field="prof-ft"]')||{}).value,10)||0; var inv=parseInt((document.querySelector('[data-field="prof-in"]')||{}).value,10)||0; p.heightIn=Math.max(36,ftv*12+inv); saveAll(); render(); }
  else if(f2==="prof-start"){ var sw=parseFloat(t.value); if(!isNaN(sw)) p.startWt=sw; saveAll(); render(); }
  else if(f2==="prof-goal"){ var gw=parseFloat(t.value); if(!isNaN(gw)) p.goalWt=gw; saveAll(); render(); }
  else if(f2==="prof-activity"){ p.activity=parseFloat(t.value); saveAll(); render(); }
  else if(f2==="prof-rate"){ p.rate=parseFloat(t.value); saveAll(); render(); }
  else if(f2==="prof-cal"){ var cv=parseInt(t.value,10); p.calTarget=isNaN(cv)?null:cv; saveAll(); render(); }
  else if(f2==="prof-prot"){ var pv=parseInt(t.value,10); p.proteinTarget=isNaN(pv)?null:pv; saveAll(); render(); }
});

document.addEventListener("input", function(e){
  var t=e.target; if(!t.dataset||!t.dataset.field) return; var f=t.dataset.field, day=getDay(dkey(state.sel));
  if(f==="ex-log"){ day.log[t.dataset.id]=t.value; saveAll(); }
  else if(f==="notes"){ day.notes=t.value; saveAll(); }
  else if(f==="wt-am"||f==="wt-pm"){ if(!day.wt) day.wt={am:null,pm:null}; var w=parseFloat(t.value); w=isNaN(w)?null:w; if(f==="wt-am") day.wt.am=w; else day.wt.pm=w; saveAll(); }
  else if(f==="foodq"){ clearTimeout(searchT); var q=t.value; searchT=setTimeout(function(){ doFoodSearch(q); },380); }
});

/* ---------- boot ---------- */
(async function(){
  state.sel=today(); state.profile=defaultProfile();
  tickClock(); setInterval(tickClock,20000);
  await loadAll();
  render();
})();
</script>
</body>
</html>
